<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SampleVault - Login</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <style>
        body {
            height: 100vh;
        }

        .login-container {
            width: 400px;
        }
    </style>
</head>

<body class="w3-display-container">

    <div class="w3-display-middle w3-mobile login-container">
        <div class="w3-card-4 vault-card w3-padding-large w3-round-large">
            <h2 class="w3-center w3-text-yellow"><b>SAMPLEVAULT</b></h2>
            <p class="w3-center">Ingresa a tu biblioteca de sonidos</p>

            <form id="loginForm">
                <label for="username">Usuario</label>
                <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="username"
                    placeholder="Nombre de usuario" required>

                <br>
                <label for="password">Contraseña</label>
                <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="password" id="password"
                    placeholder="Tu contraseña" required>

                <br>
                <button type="submit" class="w3-button w3-yellow w3-block w3-round-large"><b>ENTRAR</b></button>
            </form>

            <p class="w3-small w3-center">¿No tienes cuenta? <a href="/register" class="w3-text-yellow">Regístrate</a>
            </p>
        </div>
    </div>

    <script src="../js/services/apiService.js"></script>
    <script src="../js/components/uiHandlers.js"></script>
    <script src="../js/utils/authHelper.js"></script>
    <script src="../js/frontControllers/authFrontController.js"></script>
</body>

</html>
